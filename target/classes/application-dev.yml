spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Mở rộng CORS để Apollo Sandbox (studio.apollographql.com) gọi được localhost
app:
  cors:
    allowed-origins: http://localhost:3000,https://studio.apollographql.com

logging:
  level:
    com.yourcompany.starter: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
